plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.openwearables'
version = '0.1.0'

android {
  namespace "expo.modules.openwearables"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation("com.openwearables.health:sdk:0.11.1")
}